name: Aggiorna prezzi carburante

# Scarica il CSV MIMIT una volta al giorno, calcola le medie nazionali e
# committa prezzi-carburante.json (servito da GitHub Pages, stessa origine dell'app).

on:
  schedule:
    # ogni giorno alle 06:30 UTC (~08:30 in Italia), dopo la pubblicazione MIMIT
    - cron: "30 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: aggiorna-prezzi
  cancel-in-progress: false

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Calcola medie prezzi
        run: python scripts/aggiorna-prezzi-carburante.py

      - name: Commit se il file è cambiato
        run: |
          if [[ -n "$(git status --porcelain prezzi-carburante.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add prezzi-carburante.json
            git commit -m "chore: aggiorna prezzi carburante MIMIT"
            git push
          else
            echo "Nessuna variazione nei prezzi."
          fi
